<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTR 승강기 침수 안전 경보</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/supercluster@8.0.1/dist/supercluster.min.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060f1c;--panel:#08142a;--panel2:#0c1e38;
  --border:#1a3250;--border2:#1f4068;
  --text:#e2e8f0;--muted:#4e6a88;--dim:#2a3d56;
  --blue:#3b82f6;--blue-light:#60a5fa;--blue-dim:rgba(59,130,246,.08);
  --green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--purple:#a855f7;
  --accent:#2563eb;
}
body{font-family:'Inter',-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}

/* ── TOPBAR ── */
.topbar{
  background:rgba(6,15,28,.96);
  border-bottom:1px solid var(--border);
  padding:0 20px;height:52px;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;z-index:1000;
  backdrop-filter:blur(12px);
  box-shadow:0 1px 0 rgba(255,255,255,.04),0 2px 20px rgba(0,0,0,.5)
}
.topbar-left{display:flex;align-items:center;gap:12px}
.logo-icon{
  width:32px;height:32px;background:linear-gradient(135deg,#1d4ed8,#3b82f6);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:1rem;flex-shrink:0;box-shadow:0 0 12px rgba(59,130,246,.3)
}
.logo-text{}
.logo-title{font-size:.88rem;font-weight:700;color:#fff;letter-spacing:-.01em;line-height:1.1}
.logo-sub{font-size:.63rem;color:var(--muted);margin-top:1px;letter-spacing:.02em}
.topbar-right{display:flex;align-items:center;gap:10px}
.status-pill{display:flex;align-items:center;gap:6px;background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.15);border-radius:20px;padding:4px 11px;transition:.3s}
.status-pill.err{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.2)}
.status-pill.load{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.15)}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--green);transition:.3s}
.sdot.loading{background:var(--yellow);animation:blink 1s infinite}
.sdot.error{background:var(--red)}
.stxt{font-size:.7rem;color:#94a3b8;font-weight:500}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.upd-time{font-size:.65rem;color:var(--muted);font-variant-numeric:tabular-nums}
.refresh-btn{
  background:transparent;border:1px solid var(--border2);color:var(--muted);
  padding:5px 12px;border-radius:7px;font-size:.7rem;cursor:pointer;
  font-family:inherit;font-weight:500;transition:.15s;letter-spacing:.01em
}
.refresh-btn:hover{border-color:var(--blue);color:var(--blue-light);background:var(--blue-dim)}

/* ── ALERT BANNER ── */
.alert-banner{display:none;padding:6px 20px;font-size:.75rem;font-weight:600;text-align:center;flex-shrink:0;letter-spacing:.01em}
.alert-banner.watch{background:rgba(245,158,11,.08);border-bottom:1px solid rgba(245,158,11,.2);color:#fcd34d}
.alert-banner.danger{background:rgba(239,68,68,.08);border-bottom:1px solid rgba(239,68,68,.25);color:#fca5a5;animation:flash 2.5s infinite}
@keyframes flash{0%,100%{opacity:1}50%{opacity:.7}}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:300px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sb-section{border-bottom:1px solid var(--border);flex-shrink:0}
.sb-hdr{padding:8px 14px;font-size:.62rem;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:6px}

/* stats 2x2 card */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;padding:10px 12px}
.stat-box{
  background:rgba(255,255,255,.025);border:1px solid var(--border);
  border-radius:10px;padding:10px 12px;cursor:default;transition:.2s;position:relative;overflow:hidden
}
.stat-box::before{content:'';position:absolute;inset:0;opacity:0;transition:.2s;background:rgba(255,255,255,.03)}
.stat-box:hover::before{opacity:1}
.sv{font-size:1.55rem;font-weight:900;line-height:1;letter-spacing:-.03em}
.sl{font-size:.6rem;color:var(--muted);margin-top:5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.sv.total{color:var(--blue-light)}
.sv.danger{color:var(--red)}
.sv.watch{color:var(--yellow)}
.sv.safe{color:var(--green)}
.stat-box.total-box{border-color:rgba(96,165,250,.2)}
.stat-box.danger-box{border-color:rgba(239,68,68,.2)}
.stat-box.watch-box{border-color:rgba(245,158,11,.15)}
.stat-box.safe-box{border-color:rgba(34,197,94,.15)}

/* rain panel */
.rain-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:8px 12px}
.rain-card{
  background:rgba(255,255,255,.02);border:1px solid var(--border);
  border-radius:8px;padding:8px 10px;cursor:pointer;transition:.15s;position:relative;overflow:hidden
}
.rain-card:hover{border-color:rgba(96,165,250,.3);background:rgba(96,165,250,.03)}
.rain-card.r3{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.04)}
.rain-card.r2{border-color:rgba(245,158,11,.25);background:rgba(245,158,11,.03)}
.rain-card.r1{border-color:rgba(96,165,250,.2);background:rgba(96,165,250,.02)}
.rc-name{font-size:.72rem;font-weight:600;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rc-val{font-size:.82rem;font-weight:800;margin-top:3px;letter-spacing:-.01em}
.rc-bar{height:2px;background:rgba(255,255,255,.06);border-radius:1px;margin-top:6px;overflow:hidden}
.rc-fill{height:100%;border-radius:1px;transition:.6s}
.r0 .rc-val{color:var(--muted)} .r1 .rc-val{color:var(--blue-light)} .r2 .rc-val{color:var(--yellow)} .r3 .rc-val{color:var(--red)}

/* elev list */
.elev-list{flex:1;overflow-y:auto}
.elev-list::-webkit-scrollbar{width:3px}
.elev-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.elev-item{padding:8px 14px;border-bottom:1px solid rgba(26,50,80,.6);cursor:pointer;display:flex;align-items:flex-start;gap:10px;transition:.1s}
.elev-item:hover{background:rgba(255,255,255,.02)}
.rdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.rdot.safe{background:var(--green)}.rdot.watch{background:var(--yellow);box-shadow:0 0 4px var(--yellow)}
.rdot.danger{background:var(--red);box-shadow:0 0 7px var(--red);animation:blink 1.5s infinite}
.ei-name{font-size:.77rem;font-weight:600;color:var(--text);margin-bottom:2px;line-height:1.3}
.ei-addr{font-size:.67rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;margin-bottom:4px}
.ei-tags{display:flex;gap:3px;flex-wrap:wrap}
.etag{font-size:.58rem;padding:1px 6px;border-radius:4px;font-weight:700;letter-spacing:.02em}
.etag.fl{background:rgba(96,165,250,.08);color:var(--blue-light);border:1px solid rgba(96,165,250,.18)}
.etag.rn{background:rgba(245,158,11,.08);color:var(--yellow);border:1px solid rgba(245,158,11,.18)}
.etag.dg{background:rgba(239,68,68,.08);color:#fca5a5;border:1px solid rgba(239,68,68,.22)}

/* ── MAP ── */
.map-wrap{flex:1;position:relative}
#map{width:100%;height:100%}

/* loading overlay */
.loading-overlay{position:absolute;inset:0;background:rgba(6,15,28,.9);display:flex;align-items:center;justify-content:center;z-index:2000;flex-direction:column;gap:16px;backdrop-filter:blur(4px)}
.loading-overlay.hidden{display:none}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:.75rem;color:var(--muted);font-weight:500}
.progress-bar{width:240px;height:2px;background:var(--border);border-radius:1px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),#818cf8);border-radius:1px;transition:.4s;width:0%}

/* 모바일 로딩: 화면 안 막히게 하단 토스트로 */
@media(max-width:767px){
  .loading-overlay{
    inset:auto;bottom:76px;left:12px;right:12px;
    background:rgba(8,20,42,.96);
    border:1px solid var(--border2);
    border-radius:14px;
    padding:14px 18px;
    z-index:800;
  }
  .progress-bar{width:100%}
}

/* search bar */
.map-search{position:absolute;top:14px;left:14px;z-index:800;display:flex;gap:6px}
.map-search input{
  background:rgba(8,20,42,.95);border:1px solid var(--border2);color:var(--text);
  padding:8px 14px;border-radius:9px;font-size:.76rem;width:200px;
  backdrop-filter:blur(8px);outline:none;transition:.15s;font-family:inherit;
  box-shadow:0 2px 12px rgba(0,0,0,.4)
}
.map-search input:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(59,130,246,.12),0 2px 12px rgba(0,0,0,.4)}
.map-search input::placeholder{color:var(--muted)}
.map-search button{
  background:rgba(37,99,235,.85);border:1px solid rgba(59,130,246,.4);
  color:#fff;padding:8px 12px;border-radius:9px;font-size:.76rem;
  cursor:pointer;backdrop-filter:blur(8px);transition:.15s;font-family:inherit;font-weight:500;
  box-shadow:0 2px 12px rgba(0,0,0,.4)
}
.map-search button:hover{background:rgba(37,99,235,1)}

/* ── LAYER PANEL ── */
.layer-panel{
  position:absolute;top:14px;right:14px;z-index:800;
  background:rgba(8,20,42,.96);border:1px solid var(--border2);
  border-radius:14px;padding:12px 13px;min-width:182px;
  backdrop-filter:blur(12px);box-shadow:0 4px 32px rgba(0,0,0,.6),0 1px 0 rgba(255,255,255,.05) inset
}
.lp-title{
  font-size:.6rem;font-weight:700;color:var(--muted);
  letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;
  display:flex;align-items:center;gap:6px;padding-bottom:8px;
  border-bottom:1px solid var(--border)
}
.layer-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;gap:10px}
.layer-row+.layer-row{border-top:1px solid rgba(26,50,80,.4)}
.layer-info{display:flex;align-items:center;gap:7px;min-width:0}
.layer-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.layer-name{font-size:.72rem;color:#7a95b0;font-weight:500;white-space:nowrap}
.layer-count{font-size:.6rem;color:var(--muted);background:rgba(255,255,255,.04);padding:1px 5px;border-radius:6px;font-variant-numeric:tabular-nums}
/* toggle switch */
.toggle{position:relative;width:30px;height:16px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.tslider{position:absolute;inset:0;background:rgba(255,255,255,.1);border-radius:8px;transition:.2s;cursor:pointer;border:1px solid rgba(255,255,255,.08)}
.tslider:before{content:'';position:absolute;width:10px;height:10px;left:2px;top:2px;background:rgba(255,255,255,.5);border-radius:50%;transition:.2s}
.toggle input:checked+.tslider{background:var(--accent);border-color:rgba(59,130,246,.4)}
.toggle input:checked+.tslider:before{transform:translateX(14px);background:#fff}

/* legend */
.map-legend{
  position:absolute;bottom:28px;right:14px;z-index:800;
  background:rgba(8,20,42,.95);border:1px solid var(--border2);
  border-radius:10px;padding:10px 13px;font-size:.68rem;
  backdrop-filter:blur(8px);box-shadow:0 2px 16px rgba(0,0,0,.4)
}
.map-legend h4{color:var(--muted);font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px;font-weight:700}
.leg-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;color:#7a95b0;font-size:.67rem}
.leg-row:last-child{margin:0}
.leg-icon{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* Leaflet dark popup */
.leaflet-popup-content-wrapper{
  background:rgba(8,20,42,.98);border:1px solid var(--border2);
  color:var(--text);border-radius:12px;
  box-shadow:0 8px 32px rgba(0,0,0,.7);backdrop-filter:blur(8px)
}
.leaflet-popup-tip{background:#0d2040}
.leaflet-popup-content{margin:14px 16px;min-width:200px}
.popup-badge{display:inline-block;padding:3px 10px;border-radius:8px;font-size:.65rem;font-weight:700;margin-bottom:10px;letter-spacing:.03em}
.popup-badge.safe{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.25)}
.popup-badge.watch{background:rgba(245,158,11,.1);color:var(--yellow);border:1px solid rgba(245,158,11,.25)}
.popup-badge.danger{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}
.popup-title{font-size:.85rem;font-weight:700;margin-bottom:9px;line-height:1.3;color:#fff}
.popup-row{display:flex;justify-content:space-between;font-size:.72rem;padding:4px 0;border-bottom:1px solid rgba(26,50,80,.6);gap:14px}
.popup-row:last-child{border:none}
.popup-label{color:var(--muted)}.popup-val{font-weight:600;text-align:right}

/* cluster */
.cm{
  display:flex;align-items:center;justify-content:center;border-radius:50%;
  font-weight:800;color:#fff;font-family:'Inter',sans-serif;
  border:1.5px solid rgba(59,130,246,.35);
  box-shadow:0 2px 12px rgba(0,0,0,.5),0 0 0 4px rgba(59,130,246,.08);
  transition:.15s;letter-spacing:-.02em
}
/* pulse */
@keyframes pulse-ring{0%{transform:scale(.8);opacity:.7}70%{transform:scale(1.6);opacity:0}100%{transform:scale(1.6);opacity:0}}
.pulse-wrap{position:relative;display:flex;align-items:center;justify-content:center}
.pulse-ring{position:absolute;border-radius:50%;animation:pulse-ring 2s ease-out infinite}

/* ── MOBILE BOTTOM SHEET ── */
.sb-handle{display:none}
.mobile-fab{display:none}
.mobile-stats-bar{display:none}
.mc-btn{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:var(--blue-light);padding:5px 12px;border-radius:16px;font-size:.7rem;cursor:pointer;transition:.15s;white-space:nowrap}
.mc-btn.active,.mc-btn:hover{background:rgba(59,130,246,.25);border-color:var(--blue)}
.map-controls{position:absolute;bottom:14px;left:14px;z-index:800;display:flex;gap:6px;flex-wrap:wrap}

@media(max-width:767px){
  /* ─ topbar 간소화 ─ */
  .logo-sub{display:none}
  .logo-title{font-size:.83rem}
  .topbar{height:46px;padding:0 12px}
  .topbar-right #lupd{display:none}

  /* ─ layout: 지도 full-screen ─ */
  .layout{position:relative;overflow:hidden;flex:1;min-height:0}
  .map-wrap{position:absolute;inset:0;z-index:1}

  /* ─ sidebar → 하단 시트 ─ */
  .sidebar{
    position:fixed;bottom:0;left:0;right:0;width:100%;
    height:72vh;
    transform:translateY(calc(100% - 60px));
    transition:transform .32s cubic-bezier(.4,0,.2,1);
    border-radius:18px 18px 0 0;
    border-right:none;border-top:1px solid var(--border2);
    z-index:900;
    overflow:hidden
  }
  .sidebar.open{transform:translateY(0)}

  /* 상단 드래그 핸들 */
  .sb-handle{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:44px;cursor:pointer;flex-shrink:0;
    background:var(--panel);border-radius:18px 18px 0 0;
    border-bottom:1px solid var(--border)
  }
  .sb-handle-bar{width:36px;height:4px;background:var(--border2);border-radius:2px}
  .sb-handle-txt{font-size:.65rem;color:var(--muted);margin-top:4px}

  /* ─ layer-panel / legend → 모바일 숨김 ─ */
  .layer-panel,.map-legend{display:none!important}

  /* ─ map-search 풀폭 ─ */
  .map-search{left:8px;right:8px;top:8px}
  .map-search input{flex:1;width:auto;min-width:0;font-size:.82rem}

  /* ─ map-controls 하단 왼쪽 ─ */
  .map-controls{bottom:72px;left:8px;right:8px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px}
  .map-controls::-webkit-scrollbar{display:none}

  /* ─ 미니 stats 바 (핸들 안에 표시) ─ */
  .sb-handle-stats{display:flex;gap:16px;margin-top:2px}
  .sb-hs-item{display:flex;align-items:center;gap:4px;font-size:.7rem;font-weight:700}

  /* sidebar 내부 스크롤 확보 */
  .elev-list{overflow-y:auto;-webkit-overflow-scrolling:touch}

  /* 시트 열릴 때 지도 위 딤처리 */
  .map-dim{display:block!important}
}

.map-dim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:850;transition:opacity .3s}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo-icon">🌊</div>
    <div class="logo-text">
      <div class="logo-title">BTR 승강기 침수 안전 경보</div>
      <div class="logo-sub">실시간 강수 · 침수위험 모니터링 시스템</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="status-pill" id="status-pill">
      <div class="sdot loading" id="sdot"></div>
      <span class="stxt" id="stxt">로딩 중...</span>
    </div>
    <span class="upd-time" id="lupd"></span>
    <button class="refresh-btn" onclick="refresh()">↻ 갱신</button>
  </div>
</div>

<div class="alert-banner" id="alert-banner"></div>

<div class="layout">
  <div class="sidebar">
    <!-- 모바일 드래그 핸들 (PC에서는 display:none) -->
    <div class="sb-handle" id="sb-handle" onclick="toggleSheet()">
      <div class="sb-handle-bar"></div>
      <div class="sb-handle-stats">
        <span class="sb-hs-item" style="color:var(--blue-light)">전체 <span id="sh-total">-</span></span>
        <span class="sb-hs-item" style="color:var(--red)">🔴 <span id="sh-danger">0</span></span>
        <span class="sb-hs-item" style="color:var(--yellow)">🟡 <span id="sh-watch">0</span></span>
      </div>
    </div>

    <div class="sb-section">
      <div class="stats-grid">
        <div class="stat-box total-box">
          <div class="sv total" id="st-total">—</div>
          <div class="sl">전체 승강기</div>
        </div>
        <div class="stat-box danger-box">
          <div class="sv danger" id="st-danger">0</div>
          <div class="sl">🔴 침수위험</div>
        </div>
        <div class="stat-box watch-box">
          <div class="sv watch" id="st-watch">0</div>
          <div class="sl">🟡 주의</div>
        </div>
        <div class="stat-box safe-box">
          <div class="sv safe" id="st-safe">—</div>
          <div class="sl">🟢 안전</div>
        </div>
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-hdr">🌧 지역별 강수량</div>
      <div class="rain-grid" id="rain-list">
        <div style="grid-column:1/-1;text-align:center;padding:12px;color:var(--muted);font-size:.72rem">로딩 중...</div>
      </div>
    </div>

    <div class="sb-hdr">⚠️ 위험·주의 승강기</div>
    <div class="elev-list" id="elev-list">
      <div style="text-align:center;padding:28px;color:var(--muted);font-size:.72rem">데이터 로딩 중...</div>
    </div>

  </div>

  <div class="map-wrap">

    <div class="loading-overlay" id="loading">
      <div class="spinner"></div>
      <div class="loading-txt" id="ltxt">데이터 로딩 중...</div>
      <div class="progress-bar"><div class="progress-fill" id="pbar"></div></div>
    </div>

    <div class="map-search">
      <input type="text" id="search-input" placeholder="주소 검색..." onkeydown="if(event.key==='Enter')doSearch()">
      <button onclick="doSearch()">검색</button>
    </div>

    <div id="map"></div>

      <div class="leg-row"><div class="leg-icon" style="background:rgba(59,130,246,.5);border:1px solid var(--blue)"></div>강수 범위 (반경=강도)</div>

<script>
const WORKER_URL = 'https://btr-flood-worker.nirvana-sangsara.workers.dev';
const VWORLD_KEY = '620104E4-86EB-3711-9E1E-A085D1B979D4';

let map, sc, heatLayer = null, allPoints = [], rainData = [], weatherData = null, quakeData = [];
let radarFrames = [], radarIdx = 0, radarTimer = null, radarTiles = [];

// 레이어 상태
const layerState = { rain:true, radar:false, temp:false, wind:false, typhoon:true, quake:false, heatmap:false, danger:true, watch:true, safe:false, under:false };
// Leaflet 레이어 그룹
const layers = {
  rain: L.layerGroup(), radar: L.layerGroup(), temp: L.layerGroup(),
  wind: L.layerGroup(), typhoon: L.layerGroup(), quake: L.layerGroup(),
  danger: L.layerGroup(), watch: L.layerGroup(), safe: L.layerGroup(), under: L.layerGroup(),
  cluster: L.layerGroup(),
};

// ── MAP INIT ──
function initMap() {
  map = L.map('map', { center: [36.5, 127.8], zoom: 7, zoomControl: false, preferCanvas: true });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '©OpenStreetMap ©CARTO', maxZoom: 19, subdomains: 'abcd'
  }).addTo(map);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  layers.rain.addTo(map);
  layers.radar.addTo(map);
  layers.temp.addTo(map);
  layers.wind.addTo(map);
  layers.typhoon.addTo(map);
  layers.quake.addTo(map);
  layers.under.addTo(map);
  layers.safe.addTo(map);
  layers.watch.addTo(map);
  layers.danger.addTo(map);
  layers.cluster.addTo(map);
  map.on('moveend zoomend', renderClusters);
}

// ── LAYER TOGGLE ──
function toggleLayer(name) {
  layerState[name] = document.getElementById('lyr-' + name).checked;
  if (name === 'rain') renderRainLayer();
  else if (name === 'radar') renderRadarLayer();
  else if (name === 'temp') renderTempLayer();
  else if (name === 'wind') renderWindLayer();
  else if (name === 'typhoon') renderTyphoonLayer();
  else if (name === 'quake') renderQuakeLayer();
  else if (name === 'heatmap') renderHeatmapLayer();
  else renderClusters();
}

// ── RAIN → RISK ──
function getAddrRain(addr) {
  if (!addr || !rainData.length) return 0;
  const cityMap = {
    '서울': ['서울'], '부산': ['부산'], '대구': ['대구'], '인천': ['인천'],
    '광주': ['광주'], '대전': ['대전'], '울산': ['울산'],
    '수원': ['수원', '경기도 수원'], '창원': ['창원', '경상남도 창원'],
    '전주': ['전주', '전북'], '청주': ['청주', '충청북도'], '포항': ['포항', '경상북도 포항'],
  };
  for (const city of rainData) {
    const keys = cityMap[city.name] || [city.name];
    if (keys.some(k => addr.startsWith(k) || addr.includes(k.slice(0, 3)))) return city.rain;
  }
  return rainData.find(c => c.name === '서울')?.rain || 0;
}

function calcRisk(pt) {
  const rain = getAddrRain(pt.a);
  const hasUnder = pt.u > 0;
  let risk = 'safe';
  if (rain >= 30 && hasUnder) risk = 'danger';
  else if (rain >= 10 || (rain >= 3 && hasUnder)) risk = 'watch';
  return { risk, rain };
}

// ── RADAR LAYER — crossfade, 5초 전환 ──
async function renderRadarLayer() {
  layers.radar.clearLayers();
  if (radarTimer) { clearInterval(radarTimer); radarTimer = null; }
  radarTiles.forEach(t => { try { map.removeLayer(t); } catch{} });
  radarTiles = [];
  if (!layerState.radar) return;

  try {
    const r = await fetch('https://api.rainviewer.com/public/weather-maps.json');
    const d = await r.json();
    radarFrames = (d.radar?.past || []).slice(-6);
    if (!radarFrames.length) return;
    radarIdx = radarFrames.length - 1;

    function showFrame(i) {
      const oldTiles = [...radarTiles];
      radarTiles = [];
      const frame = radarFrames[i];
      if (!frame) return;

      // 새 타일 opacity 0 → 로드 후 fade in
      const tile = L.tileLayer(
        `https://tilecache.rainviewer.com${frame.path}/512/{z}/{x}/{y}/4/1_1.png`,
        { opacity: 0, attribution: '©RainViewer', maxZoom: 18, tileSize: 512, zoomOffset: -1 }
      );
      tile.addTo(map);
      radarTiles.push(tile);

      // 50ms 후 fade in 시작
      setTimeout(() => {
        tile.setOpacity(0.55);
        // 600ms crossfade 완료 후 이전 타일 제거
        setTimeout(() => {
          oldTiles.forEach(t => { try { map.removeLayer(t); } catch{} });
        }, 700);
      }, 60);
    }

    showFrame(radarIdx);
    // 5초마다 프레임 순환
    radarTimer = setInterval(() => {
      if (!layerState.radar) { clearInterval(radarTimer); return; }
      radarIdx = (radarIdx + 1) % radarFrames.length;
      showFrame(radarIdx);
    }, 5000);
  } catch(e) { console.warn('RainViewer 로드 실패', e); }
}

// ── HEATMAP LAYER (승강기 밀도) ──
function renderHeatmapLayer() {
  if (heatLayer) { try { map.removeLayer(heatLayer); } catch{} heatLayer = null; }
  if (!layerState.heatmap || !allPoints.length) return;
  const pts = allPoints.map(p => [p.lat, p.lng, 0.5]);
  heatLayer = L.heatLayer(pts, {
    radius: 18, blur: 22, maxZoom: 12,
    gradient: { 0.2: '#312e81', 0.4: '#1d4ed8', 0.6: '#059669', 0.8: '#d97706', 1.0: '#dc2626' }
  });
  heatLayer.addTo(map);
}

// ── TEMP LAYER ──
function renderTempLayer() {
  layers.temp.clearLayers();
  if (!layerState.temp || !weatherData?.stations) return;
  weatherData.stations.forEach(s => {
    if (s.ta == null) return;
    const ta = s.ta;
    const color = ta >= 35 ? '#dc2626' : ta >= 30 ? '#ea580c' : ta >= 25 ? '#d97706' : ta >= 20 ? '#16a34a' : ta >= 15 ? '#0284c7' : ta >= 10 ? '#4f46e5' : '#7e22ce';
    L.circle([s.lat, s.lng], {
      radius: 55000, color, fillColor: color,
      fillOpacity: 0.1, opacity: 0, weight: 0,
    }).addTo(layers.temp);
    const icon = L.divIcon({
      html: `<div style="background:rgba(8,20,42,.9);border:1.5px solid ${color}99;border-radius:6px;padding:2px 7px;font-size:.68rem;font-weight:800;color:${color};white-space:nowrap;font-family:Inter,sans-serif;letter-spacing:-.01em">${ta.toFixed(1)}°</div>`,
      iconSize: [48, 20], iconAnchor: [24, 10], className: ''
    });
    L.marker([s.lat, s.lng], { icon })
      .bindPopup(`<b>${s.name}</b><br>🌡 ${ta}°C &nbsp; 💧 ${s.hm}%`)
      .addTo(layers.temp);
  });
}

// ── WIND LAYER ──
function renderWindLayer() {
  layers.wind.clearLayers();
  if (!layerState.wind || !weatherData?.stations) return;
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  weatherData.stations.forEach(s => {
    if (s.ws == null || s.ws < 0.5) return;
    const ws = s.ws, wd = s.wd || 0;
    const beaufort = ws >= 17.2 ? 8 : ws >= 13.9 ? 7 : ws >= 10.8 ? 6 : ws >= 8.0 ? 5 : ws >= 5.5 ? 4 : ws >= 3.4 ? 3 : ws >= 1.6 ? 2 : 1;
    const color = ws >= 14 ? '#ef4444' : ws >= 9 ? '#f97316' : ws >= 5 ? '#f59e0b' : '#818cf8';
    const arrowDeg = (wd + 180) % 360;
    const dirLabel = dirs[Math.round(wd / 22.5) % 16];
    const sz = Math.min(26, 13 + beaufort * 2);
    const icon = L.divIcon({
      html: `<div style="display:flex;flex-direction:column;align-items:center;gap:1px;font-family:Inter,sans-serif">
        <div style="font-size:${sz}px;line-height:1;transform:rotate(${arrowDeg}deg);filter:drop-shadow(0 0 3px ${color})">↑</div>
        <div style="background:rgba(8,20,42,.92);border:1px solid ${color}88;border-radius:4px;padding:1px 5px;font-size:.62rem;font-weight:700;color:${color}">${ws}m/s</div>
      </div>`,
      iconSize: [44, 36], iconAnchor: [22, 18], className: ''
    });
    L.marker([s.lat, s.lng], { icon })
      .bindPopup(`<b>${s.name}</b><br>💨 ${ws}m/s &nbsp; ${dirLabel} (${wd}°)<br>Beaufort ${beaufort}`)
      .addTo(layers.wind);
  });
}

// ── TYPHOON LAYER ──
function renderTyphoonLayer() {
  layers.typhoon.clearLayers();
  const typh = weatherData?.typhoons || [];
  document.getElementById('cnt-typhoon').textContent = typh.length;
  if (!typh.length) { document.getElementById('alert-banner').style.display='none'; return; }
  if (layerState.typhoon) {
    document.getElementById('alert-banner').innerHTML =
      typh.map(t=>`🌀 <b>${t.name_en}</b> (${t.yr}-${t.seq}호) 활동 중`).join(' &nbsp;|&nbsp; ');
    document.getElementById('alert-banner').className = 'alert-banner danger';
    document.getElementById('alert-banner').style.display = 'block';
  }
}

// ── QUAKE LAYER ──
async function loadAndRenderQuake() {
  try {
    const r = await fetch('https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&starttime=now-7days&minmagnitude=2.5&minlatitude=33&maxlatitude=43&minlongitude=124&maxlongitude=132&orderby=time&limit=50');
    const d = await r.json();
    quakeData = d.features || [];
    document.getElementById('cnt-quake').textContent = quakeData.length;
    renderQuakeLayer();
  } catch {}
}

function renderQuakeLayer() {
  layers.quake.clearLayers();
  if (!layerState.quake || !quakeData.length) return;
  quakeData.forEach(f => {
    const [lng, lat, depth] = f.geometry.coordinates;
    const mag = f.properties.mag;
    const place = f.properties.place || '';
    const time = new Date(f.properties.time).toLocaleString('ko-KR');
    const r = Math.pow(10, mag * 0.5) * 2000;
    const color = mag >= 5 ? '#ef4444' : mag >= 4 ? '#f97316' : mag >= 3 ? '#f59e0b' : '#facc15';
    L.circle([lat, lng], {
      radius: r, color, fillColor: color,
      fillOpacity: 0.12, opacity: 0.5, weight: 1.5,
    }).bindPopup(`<b>🌏 M${mag} 지진</b><br>${place}<br>깊이 ${depth}km<br><small>${time}</small>`)
      .addTo(layers.quake);
    if (mag >= 3) {
      const icon = L.divIcon({
        html: `<div style="background:rgba(8,20,42,.95);border:2px solid ${color};border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:900;color:${color};font-family:Inter,sans-serif">M${mag}</div>`,
        iconSize: [22, 22], iconAnchor: [11, 11], className: ''
      });
      L.marker([lat, lng], { icon })
        .bindPopup(`<b>🌏 M${mag}</b><br>${place}<br>${time}`)
        .addTo(layers.quake);
    }
  });
}

// ── RAIN LAYER ──
function renderRainLayer() {
  layers.rain.clearLayers();
  if (!layerState.rain || !rainData.length) return;
  rainData.forEach(c => {
    if (!c.rain || c.rain <= 0) return;
    const mm = c.rain;
    const radius = Math.min(80000, 15000 + mm * 1800);
    const opacity = Math.min(0.4, 0.08 + mm / 80);
    const color = mm >= 30 ? '#ef4444' : mm >= 10 ? '#f59e0b' : '#3b82f6';
    const circle = L.circle([c.lat, c.lng], {
      radius, color, fillColor: color,
      fillOpacity: opacity, opacity: opacity * 1.4, weight: 1,
    });
    circle.bindPopup(`
      <div class="popup-title">🌧 ${c.name} 강수량</div>
      <div class="popup-row"><span class="popup-label">강수량</span><span class="popup-val" style="color:${color}">${mm}mm/h</span></div>
      <div class="popup-row"><span class="popup-label">유형</span><span class="popup-val">${c.pty===1?'비':c.pty===4?'소나기':c.pty===2?'눈비':'강수'}</span></div>
    `, { maxWidth: 200 });
    layers.rain.addLayer(circle);

    if (mm >= 10) {
      const pulseSz = mm >= 30 ? 18 : 13;
      const icon = L.divIcon({
        html: `<div class="pulse-wrap" style="width:${pulseSz}px;height:${pulseSz}px">
          <div class="pulse-ring" style="width:${pulseSz}px;height:${pulseSz}px;background:${color};opacity:.45"></div>
          <div style="width:${pulseSz*0.6}px;height:${pulseSz*0.6}px;border-radius:50%;background:${color};z-index:1;box-shadow:0 0 8px ${color}"></div>
        </div>`,
        iconSize: [pulseSz, pulseSz], iconAnchor: [pulseSz / 2, pulseSz / 2], className: ''
      });
      layers.rain.addLayer(L.marker([c.lat, c.lng], { icon }));
    }
  });
}

// ── SUPERCLUSTER ──
function buildSupercluster(points) {
  sc = new Supercluster({ radius: 60, maxZoom: 16, minZoom: 5 });
  sc.load(points.map(p => ({
    type: 'Feature',
    properties: { ...p },
    geometry: { type: 'Point', coordinates: [p.lng, p.lat] }
  })));
}

function renderClusters() {
  layers.danger.clearLayers();
  layers.watch.clearLayers();
  layers.safe.clearLayers();
  layers.under.clearLayers();
  layers.cluster.clearLayers();
  if (!sc) return;

  const zoom = Math.floor(map.getZoom());
  const b = map.getBounds();
  const bbox = [b.getWest(), b.getSouth(), b.getEast(), b.getNorth()];
  const clusters = sc.getClusters(bbox, zoom);

  clusters.forEach(feat => {
    const [lng, lat] = feat.geometry.coordinates;
    const props = feat.properties;

    if (props.cluster) {
      const count = props.point_count;
      const sz = count > 5000 ? 52 : count > 1000 ? 44 : count > 200 ? 36 : count > 50 ? 30 : 24;
      const fontSize = sz > 42 ? 12 : 10;
      const icon = L.divIcon({
        html: `<div class="cm" style="width:${sz}px;height:${sz}px;background:rgba(13,32,64,.88);font-size:${fontSize}px">${count > 9999 ? Math.round(count / 1000) + 'k' : count}</div>`,
        iconSize: [sz, sz], iconAnchor: [sz / 2, sz / 2], className: ''
      });
      const mk = L.marker([lat, lng], { icon });
      mk.on('click', () => map.setView([lat, lng], Math.min(sc.getClusterExpansionZoom(props.cluster_id), 16)));
      layers.cluster.addLayer(mk);
      return;
    }

    const pt = props;
    const { risk, rain } = calcRisk(pt);
    const hasUnder = pt.u > 0;

    if (risk === 'danger' && !layerState.danger) return;
    if (risk === 'watch' && !layerState.watch) return;
    if (risk === 'safe' && !layerState.safe) return;
    if (layerState.under && !hasUnder) return;

    const color = risk === 'danger' ? '#ef4444' : risk === 'watch' ? '#f59e0b' : '#22c55e';
    const sz = risk === 'danger' ? 14 : risk === 'watch' ? 10 : 7;
    const glow = risk === 'danger'
      ? `box-shadow:0 0 0 3px rgba(239,68,68,.18),0 0 10px ${color}`
      : risk === 'watch' ? `box-shadow:0 0 6px ${color}` : '';

    const icon = L.divIcon({
      html: risk === 'danger'
        ? `<div class="pulse-wrap" style="width:${sz+6}px;height:${sz+6}px">
            <div class="pulse-ring" style="width:${sz+6}px;height:${sz+6}px;background:${color};opacity:.35"></div>
            <div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${color};${glow};border:1.5px solid rgba(255,255,255,.25)"></div>
           </div>`
        : `<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${color};${glow};border:1px solid ${color}aa"></div>`,
      iconSize: [sz + (risk === 'danger' ? 6 : 0), sz + (risk === 'danger' ? 6 : 0)],
      iconAnchor: [(sz + (risk === 'danger' ? 6 : 0)) / 2, (sz + (risk === 'danger' ? 6 : 0)) / 2],
      className: ''
    });

    const mk = L.marker([lat, lng], { icon });
    mk.bindPopup(`
      <div class="popup-badge ${risk}">${risk === 'danger' ? '⚠ 침수위험' : risk === 'watch' ? '⚡ 주의' : '✅ 안전'}</div>
      <div class="popup-title">${pt.b || '승강기 ' + pt.n}</div>
      <div class="popup-row"><span class="popup-label">주소</span><span class="popup-val" style="font-size:.68rem">${pt.a || '-'}</span></div>
      <div class="popup-row"><span class="popup-label">지하층</span><span class="popup-val">${pt.u || 0}층</span></div>
      <div class="popup-row"><span class="popup-label">현재 강수</span><span class="popup-val" style="color:${rain >= 30 ? '#ef4444' : rain >= 10 ? '#f59e0b' : '#22c55e'}">${rain}mm/h</span></div>
      <div class="popup-row"><span class="popup-label">승강기 번호</span><span class="popup-val">${pt.n || '-'}</span></div>
    `, { maxWidth: 260 });

    const targetLayer = layerState.under ? layers.under : layers[risk];
    targetLayer.addLayer(mk);
  });
}

// ── RAIN UI ──
function renderRain(data) {
  const sorted = [...data].sort((a, b) => b.rain - a.rain);
  document.getElementById('rain-list').innerHTML = sorted.map(d => {
    const mm = d.rain;
    const cls = mm >= 30 ? 'r3' : mm >= 10 ? 'r2' : mm >= 1 ? 'r1' : 'r0';
    const barW = Math.min(100, mm / 30 * 100);
    const barC = mm >= 30 ? 'var(--red)' : mm >= 10 ? 'var(--yellow)' : mm >= 1 ? 'var(--blue-light)' : 'var(--border)';
    const icon = d.pty === 1 ? '🌧' : d.pty === 4 ? '⛈' : d.pty === 2 ? '🌨' : '☁';
    return `<div class="rain-card ${cls}" onclick="map.setView([${d.lat},${d.lng}],10)">
      <div class="rc-name">${icon} ${d.name}</div>
      <div class="rc-val">${mm > 0 ? mm + '<small style="font-size:.6rem;font-weight:400"> mm/h</small>' : '<span style="font-size:.68rem;color:var(--muted)">강수없음</span>'}</div>
      <div class="rc-bar"><div class="rc-fill" style="width:${barW}%;background:${barC}"></div></div>
    </div>`;
  }).join('');
}

// ── ELEV LIST ──
function renderElevList() {
  let safe = 0, watch = 0, danger = 0, underCount = 0;
  const risky = [];
  allPoints.forEach(p => {
    const { risk, rain } = calcRisk(p);
    if (p.u > 0) underCount++;
    if (risk === 'danger') { danger++; risky.push({ ...p, risk, rain }); }
    else if (risk === 'watch') { watch++; risky.push({ ...p, risk, rain }); }
    else safe++;
  });
  risky.sort((a, b) => (b.risk === 'danger' ? 2 : 1) - (a.risk === 'danger' ? 2 : 1) || b.rain - a.rain);

  document.getElementById('st-total').textContent = allPoints.length.toLocaleString();
  document.getElementById('st-safe').textContent = safe.toLocaleString();
  document.getElementById('st-watch').textContent = watch.toLocaleString();
  document.getElementById('st-danger').textContent = danger.toLocaleString();
  // 모바일 핸들 미니 stats 동기화
  const shTotal = document.getElementById('sh-total');
  const shDanger = document.getElementById('sh-danger');
  const shWatch = document.getElementById('sh-watch');
  if(shTotal) shTotal.textContent = allPoints.length.toLocaleString();
  if(shDanger) shDanger.textContent = danger;
  if(shWatch) shWatch.textContent = watch;
  document.getElementById('cnt-danger').textContent = danger;
  document.getElementById('cnt-watch').textContent = watch;
  document.getElementById('cnt-safe').textContent = safe.toLocaleString();
  document.getElementById('cnt-under').textContent = underCount.toLocaleString();

  const banner = document.getElementById('alert-banner');
  if (danger > 0) {
    banner.className = 'alert-banner danger'; banner.style.display = 'block';
    banner.textContent = `⚠ 경보: 침수위험 승강기 ${danger.toLocaleString()}대 — 즉각 점검 필요`;
  } else if (watch > 0) {
    banner.className = 'alert-banner watch'; banner.style.display = 'block';
    banner.textContent = `⚡ 주의: 강수 감지 ${watch.toLocaleString()}대 모니터링 중`;
  } else { banner.style.display = 'none'; }

  if (!risky.length) {
    document.getElementById('elev-list').innerHTML = '<div style="text-align:center;padding:32px 16px;color:var(--muted);font-size:.72rem"><div style="font-size:1.4rem;margin-bottom:8px">✅</div>현재 위험·주의 승강기 없음</div>';
    return;
  }
  document.getElementById('elev-list').innerHTML = risky.slice(0, 120).map(p =>
    `<div class="elev-item" onclick="map.setView([${p.lat},${p.lng}],15)">
      <div class="rdot ${p.risk}"></div>
      <div style="min-width:0">
        <div class="ei-name">${p.b || '승강기 ' + p.n}</div>
        <div class="ei-addr">${p.a}</div>
        <div class="ei-tags">
          ${p.u > 0 ? `<span class="etag fl">B${p.u}</span>` : ''}
          ${p.rain > 0 ? `<span class="etag rn">${p.rain}㎜</span>` : ''}
          ${p.risk === 'danger' ? '<span class="etag dg">침수위험</span>' : ''}
        </div>
      </div>
    </div>`
  ).join('');
}

// ── SEARCH ──
async function doSearch() {
  const addr = document.getElementById('search-input').value.trim();
  if (!addr) return;
  try {
    const r = await fetch(`https://api.vworld.kr/req/address?service=address&request=getcoord&version=2.0&crs=epsg:4326&address=${encodeURIComponent(addr)}&refine=true&simple=false&format=json&type=parcel&key=${VWORLD_KEY}`);
    const d = await r.json();
    if (d?.response?.status === 'OK') {
      const pt = d.response.result?.point;
      map.setView([parseFloat(pt.y), parseFloat(pt.x)], 14);
    } else alert('주소를 찾을 수 없습니다.');
  } catch { alert('검색 오류'); }
}

// ── PROGRESS / STATUS ──
function setProgress(pct, txt) {
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('ltxt').textContent = txt;
}
function setStatus(state, txt) {
  const dot = document.getElementById('sdot');
  const pill = document.getElementById('status-pill');
  dot.className = 'sdot' + (state === 'loading' ? ' loading' : state === 'error' ? ' error' : '');
  pill.className = 'status-pill' + (state === 'error' ? ' err' : state === 'loading' ? ' load' : '');
  document.getElementById('stxt').textContent = txt;
  if (state === 'ok') document.getElementById('lupd').textContent = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }) + ' 기준';
}

// ── CACHE ──
const CACHE_KEY = 'flood_elev_v4';
const CACHE_TTL = 30 * 60 * 1000;
function loadLocalCache() {
  try { const r = localStorage.getItem(CACHE_KEY); if (!r) return null; const { ts, data } = JSON.parse(r); if (Date.now() - ts > CACHE_TTL) { localStorage.removeItem(CACHE_KEY); return null; } return data; } catch { return null; }
}
function saveLocalCache(data) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data })); } catch {}
}

async function loadElevators() {
  const cached = loadLocalCache();
  if (cached) { allPoints = cached; setProgress(97, `캐시 ${allPoints.length.toLocaleString()}건 즉시 로드`); return; }
  setProgress(55, '승강기 데이터 수신 중...');
  try {
    const r = await fetch(`${WORKER_URL}/elevators?t=${Math.floor(Date.now() / 60000)}`);
    const data = await r.json();
    const points = data.points || [];
    setProgress(90, `${points.length.toLocaleString()}건 수신 완료`);
    allPoints = points.map(p => ({ n: p.no || '', b: (p.name || '').slice(0, 20), a: (p.addr || '').slice(0, 30), u: p.under || 0, t: 0, lat: p.lat, lng: p.lng })).filter(p => p.lat && p.lng);
    saveLocalCache(allPoints);
    setProgress(97, `${allPoints.length.toLocaleString()}건 로드 완료`);
  } catch { setProgress(97, '데이터 로드 실패 — 지도만 표시'); }
}

// ── REFRESH ──
async function refresh() {
  setStatus('loading', '기상 업데이트 중...');
  try {
    const [rain, weather] = await Promise.all([
      fetch(`${WORKER_URL}/rain?t=${Date.now()}`).then(r => r.json()),
      fetch(`${WORKER_URL}/weather?t=${Date.now()}`).then(r => r.json()),
    ]);
    rainData = rain;
    weatherData = weather;
    renderRain(rainData);
    renderRainLayer();
    renderTempLayer();
    renderWindLayer();
    renderTyphoonLayer();
    renderHeatmapLayer();
    await loadAndRenderQuake();
    renderElevList();
    renderClusters();
    setStatus('ok', '실시간 연결');
  } catch { setStatus('error', '연결 오류'); }
}

// ── MAIN ──
async function init() {
  // 방어: 최대 20초 후 무조건 loading 숨김
  const loadingEl = document.getElementById('loading');
  const forceHide = setTimeout(() => { if(loadingEl) loadingEl.classList.add('hidden'); }, 20000);

  try {
  initMap();
  setProgress(10, '강수 데이터 수신 중...');
  try {
    rainData = await (await fetch(`${WORKER_URL}/rain`)).json();
    renderRain(rainData);
    setProgress(25, '강수 데이터 완료');
  } catch { rainData = []; setProgress(25, '강수 데이터 실패'); }

  try {
    const [wd] = await Promise.all([
      fetch(`${WORKER_URL}/weather`).then(r => r.json()),
      loadAndRenderQuake(),
    ]);
    weatherData = wd;
    renderTyphoonLayer();
  } catch { weatherData = null; }

  setProgress(40, '승강기 데이터 수신 중...');
  await loadElevators();

  setProgress(93, 'Supercluster 빌드 중...');
  buildSupercluster(allPoints);

  renderRainLayer();
  renderElevList();
  renderClusters();
  renderHeatmapLayer();
  } catch(e) {
    console.error('init error:', e);
  } finally {
  clearTimeout(forceHide);
  document.getElementById('loading').classList.add('hidden');
  setStatus('ok', '실시간 연결');
  }
  setInterval(refresh, 5 * 60 * 1000);
}

// ===== MOBILE SHEET =====
let _sheetOpen = false;
let _touchStartY = 0;

function toggleSheet() {
  _sheetOpen ? closeSheet() : openSheet();
}
function openSheet() {
  _sheetOpen = true;
  document.querySelector('.sidebar').classList.add('open');
  document.getElementById('map-dim').style.opacity = '1';
}
function closeSheet() {
  _sheetOpen = false;
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('map-dim').style.opacity = '0';
  setTimeout(() => { document.getElementById('map-dim').style.display = ''; }, 300);
}

// 터치 스와이프 (위로 올리면 열고, 아래로 내리면 닫기)
(function setupTouch() {
  const handle = document.getElementById('sb-handle');
  if (!handle) return;
  handle.addEventListener('touchstart', e => { _touchStartY = e.touches[0].clientY; }, {passive:true});
  handle.addEventListener('touchend', e => {
    const dy = e.changedTouches[0].clientY - _touchStartY;
    if (dy < -30) openSheet();
    else if (dy > 30) closeSheet();
  }, {passive:true});
})();

// 모바일 퀵 필터 (지도 위 칩버튼)
let _quickFilter = 'all';
function setQuickFilter(f, btn) {
  _quickFilter = f;
  document.querySelectorAll('.mc-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderClusters();
}

// renderClusters 호출 시 quickFilter 적용 — 기존 buildSupercluster를 유지하되
// 퀵필터 상태에 따라 Supercluster.getClusters 결과 후처리
const _origRenderClusters = window.renderClusters;

// stats 핸들 업데이트
const _origRenderElevList = window.renderElevList;

init();
</script>
